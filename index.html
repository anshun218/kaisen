<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="開通計算">
<link rel="manifest" href="manifest.json">
<title>開通件数計算</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;
  --accent:#4f8ef7;--accent2:#38d9a9;
  --text:#f0f0f0;--text2:#8888aa;
  --border:rgba(255,255,255,0.08);
  --success:#38d9a9;--warning:#ffd43b;--danger:#ff6b6b;
  --orange:#ff9f43;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;padding-bottom:80px}
.header{background:var(--bg2);padding:52px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;color:var(--text2);margin-top:2px}
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:10;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:12px 4px 8px;border:none;background:transparent;color:var(--text2);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}
.page{display:none;padding:16px}
.page.active{display:block}
.section-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-label{flex:1;font-size:14px}
.row-sub{font-size:11px;color:var(--text2);margin-top:2px}
.row-right{display:flex;align-items:center;gap:6px}
.input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-weight:600;text-align:right;padding:6px 10px;width:85px;outline:none;-webkit-appearance:none}
.input:focus{border-color:var(--accent)}
.input.wide{width:110px}
.unit{font-size:11px;color:var(--text2);min-width:24px}
.badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-tokyo{background:rgba(79,142,247,0.2);color:#4f8ef7}
.badge-osaka{background:rgba(56,217,169,0.2);color:#38d9a9}
.badge-fullcomm{background:rgba(255,159,67,0.2);color:#ff9f43}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:rgba(255,107,107,0.2);color:var(--danger)}
.btn-success{background:rgba(56,217,169,0.2);color:var(--success)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.member-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.member-header{display:flex;align-items:center;padding:12px 16px;gap:10px;border-bottom:1px solid var(--border)}
.member-name{flex:1;font-size:15px;font-weight:600}
.member-body{padding:12px 16px}
.member-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.member-row:last-child{margin-bottom:0}
.member-row label{font-size:12px;color:var(--text2);min-width:80px}
.select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:6px 10px;outline:none}
.add-btn{width:100%;padding:14px;border:1px dashed var(--border);border-radius:14px;background:transparent;color:var(--text2);font-size:14px;cursor:pointer;margin-bottom:12px}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi-card{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:12px 8px;text-align:center}
.kpi-label{font-size:10px;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:700}
.kpi-unit{font-size:10px;color:var(--text2)}
.result-big{background:var(--bg2);border:1px solid rgba(79,142,247,0.3);border-radius:16px;padding:20px;text-align:center;margin-bottom:8px}
.result-big-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.result-big-val{font-size:36px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.small-card{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:14px;text-align:center}
.small-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.small-val{font-size:20px;font-weight:700}
.pl-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.pl-title{font-size:12px;font-weight:600;padding:10px 16px;border-bottom:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:8px}
.pl-row{display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px}
.pl-row:last-child{border-bottom:none}
.pl-row.total{font-weight:700;font-size:14px}
.pl-row.sub{color:var(--text2);font-size:12px}
.positive{color:var(--success)}
.negative{color:var(--danger)}
.accent-text{color:var(--accent)}
.target-wrap{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:8px}
.target-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.target-title{font-size:13px;font-weight:600}
.target-pct{font-size:18px;font-weight:800}
.bar-bg{background:var(--bg3);border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s;background:var(--accent)}
.target-sub{font-size:11px;color:var(--text2);margin-top:8px;text-align:right}
.success-c{color:var(--success)!important}
.warning-c{color:var(--warning)!important}
.danger-c{color:var(--danger)!important}
.log-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.log-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.log-week{font-size:14px;font-weight:600}
.log-total{font-size:13px;color:var(--accent);font-weight:600}
.log-body{padding:12px 16px}
.log-member-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.log-member-row:last-child{margin-bottom:0}
.log-member-name{font-size:12px;min-width:70px;color:var(--text2)}
.log-inputs{display:flex;gap:6px;flex:1}
.log-input-wrap{flex:1;text-align:center}
.log-input-label{font-size:9px;color:var(--text2);margin-bottom:2px}
.log-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:600;text-align:center;padding:5px 4px;outline:none}
.actual-rate{font-size:11px;color:var(--warning);margin-top:4px;text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
</style>
</head>
<body>
<div class="header">
  <h1>開通件数計算</h1>
  <p id="header-sub">チーム管理・KPI・損益</p>
</div>

<!-- ページ1: メンバー -->
<div class="page active" id="page-members">
  <div class="section-title" style="margin-top:8px">メンバー管理</div>
  <button class="add-btn" onclick="addMember()">＋ メンバーを追加</button>
  <div id="member-list"></div>
</div>

<!-- ページ2: KPI設定 -->
<div class="page" id="page-kpi">
  <div class="section-title" style="margin-top:8px">ファネル設定</div>
  <div class="card">
    <div class="row"><div class="row-label">反響率（東京）</div><div class="row-right"><input type="number" class="input" id="k-hankyou-tokyo" value="1.6" step="0.1" oninput="calcAll()"><span class="unit">%</span></div></div>
    <div class="row"><div class="row-label">反響率（大阪）</div><div class="row-right"><input type="number" class="input" id="k-hankyou-osaka" value="1.2" step="0.1" oninput="calcAll()"><span class="unit">%</span></div></div>
    <div class="row"><div class="row-label">対面率</div><div class="row-right"><input type="number" class="input" id="k-taimen" value="80" step="1" oninput="calcAll()"><span class="unit">%</span></div></div>
    <div class="row"><div class="row-label">獲得率</div><div class="row-right"><input type="number" class="input" id="k-shutoku" value="30" step="1" oninput="calcAll()"><span class="unit">%</span></div></div>
    <div class="row"><div class="row-label">後確通過率</div><div class="row-right"><input type="number" class="input" id="k-koku" value="90" step="1" oninput="calcAll()"><span class="unit">%</span></div></div>
    <div class="row"><div class="row-label">開通率</div><div class="row-right"><input type="number" class="input" id="k-kaisen" value="80" step="1" oninput="calcAll()"><span class="unit">%</span></div></div>
  </div>
  <div class="section-title">コスト設定</div>
  <div class="card">
    <div class="row"><div class="row-label">売上単価</div><div class="row-right"><input type="number" class="input wide" id="k-tanka" value="70000" step="1000" oninput="calcAll()"><span class="unit">円</span></div></div>
    <div class="row"><div class="row-label">チラシ単価</div><div class="row-right"><input type="number" class="input" id="k-chirashi" value="2.5" step="0.5" oninput="calcAll()"><span class="unit">円/枚</span></div></div>
    <div class="row"><div class="row-label">OPP袋単価</div><div class="row-right"><input type="number" class="input" id="k-opp" value="3.5" step="0.5" oninput="calcAll()"><span class="unit">円/枚</span></div></div>
    <div class="row"><div class="row-label">外注ポス単価</div><div class="row-right"><input type="number" class="input" id="k-posting" value="13.5" step="0.5" oninput="calcAll()"><span class="unit">円/枚</span></div></div>
    <div class="row"><div class="row-label">交通費/人</div><div class="row-right"><input type="number" class="input" id="k-kotsu" value="50000" step="5000" oninput="calcAll()"><span class="unit">円</span></div></div>
    <div class="row"><div class="row-label">オフィス費用</div><div class="row-right"><input type="number" class="input wide" id="k-office" value="300000" step="10000" oninput="calcAll()"><span class="unit">円</span></div></div>
    <div class="row"><div class="row-label">その他経費</div><div class="row-right"><input type="number" class="input wide" id="k-other" value="160000" step="10000" oninput="calcAll()"><span class="unit">円</span></div></div>
    <div class="row"><div class="row-label">月間目標売上</div><div class="row-right"><input type="number" class="input wide" id="k-target" value="5000000" step="100000" oninput="calcAll()"><span class="unit">円</span></div></div>
  </div>
</div>

<!-- ページ3: 予測 -->
<div class="page" id="page-result">
  <div id="result-content"><div class="empty">メンバーを追加してください</div></div>
</div>

<!-- ページ4: ログ -->
<div class="page" id="page-log">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:8px">
    <div class="section-title" style="margin:0">週次ログ</div>
    <button class="btn btn-primary btn-sm" onclick="addLog()">＋ 今週を記録</button>
  </div>
  <div id="actual-kpi" class="card" style="margin-bottom:12px;display:none">
    <div class="row"><div class="row-label">実績 反響率</div><div class="row-right"><span id="act-hankyou" style="font-size:14px;font-weight:600;color:var(--warning)">—</span></div></div>
    <div class="row"><div class="row-label">実績 対面率</div><div class="row-right"><span id="act-taimen" style="font-size:14px;font-weight:600;color:var(--warning)">—</span></div></div>
    <div class="row"><div class="row-label">実績 獲得率</div><div class="row-right"><span id="act-shutoku" style="font-size:14px;font-weight:600;color:var(--warning)">—</span></div></div>
    <div class="row"><div class="row-label">実績 開通率</div><div class="row-right"><span id="act-kaisen-rate" style="font-size:14px;font-weight:600;color:var(--warning)">—</span></div></div>
  </div>
  <div id="log-list"></div>
</div>

<!-- ナビ -->
<div class="nav">
  <button class="nav-btn active" onclick="showPage('members',this)"><span class="nav-icon">👥</span>メンバー</button>
  <button class="nav-btn" onclick="showPage('kpi',this)"><span class="nav-icon">⚙️</span>設定</button>
  <button class="nav-btn" onclick="showPage('result',this)"><span class="nav-icon">📊</span>予測</button>
  <button class="nav-btn" onclick="showPage('log',this)"><span class="nav-icon">📝</span>ログ</button>
</div>

<script>
// データ
let members = [
  {id:1,name:'安斎',area:'tokyo',salary:300000,weeklySheetsInput:2000,type:'fixed'},
  {id:2,name:'大村',area:'tokyo',salary:600000,weeklySheetsInput:2000,type:'fixed'},
  {id:3,name:'深澤',area:'tokyo',salary:300000,weeklySheetsInput:2000,type:'fixed'},
  {id:4,name:'アンジュ',area:'tokyo',salary:250000,weeklySheetsInput:2000,type:'fixed'},
  {id:5,name:'レオ',area:'tokyo',salary:250000,weeklySheetsInput:2000,type:'fixed'},
  {id:6,name:'上西',area:'osaka',salary:300000,weeklySheetsInput:4000,type:'fixed'},
  {id:7,name:'河岸',area:'osaka',salary:300000,weeklySheetsInput:4000,type:'fixed'},
  {id:8,name:'こてつ',area:'osaka',salary:40000,weeklySheetsInput:2500,type:'fullcomm'},
];
let logs = [];
let nextId = 9;

function save(){localStorage.setItem('members',JSON.stringify(members));localStorage.setItem('logs',JSON.stringify(logs));}
function load(){
  try{
    const m=localStorage.getItem('members');
    const l=localStorage.getItem('logs');
    if(m)members=JSON.parse(m);
    if(l)logs=JSON.parse(l);
    nextId=members.reduce((a,b)=>Math.max(a,b.id),0)+1;
  }catch(e){}
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='result')renderResult();
  if(name==='log')renderLogs();
}

function addMember(){
  const m={id:nextId++,name:'新メンバー',area:'tokyo',salary:250000,weeklySheetsInput:2000,type:'fixed'};
  members.push(m);
  save();
  renderMembers();
}

function deleteMember(id){
  if(!confirm('削除しますか？'))return;
  members=members.filter(m=>m.id!==id);
  save();
  renderMembers();
  calcAll();
}

function updateMember(id,field,val){
  const m=members.find(m=>m.id===id);
  if(!m)return;
  if(field==='salary'||field==='weeklySheetsInput')m[field]=parseFloat(val)||0;
  else m[field]=val;
  save();
  calcAll();
}

function renderMembers(){
  const list=document.getElementById('member-list');
  if(!members.length){list.innerHTML='<div class="empty">メンバーがいません</div>';return;}
  list.innerHTML=members.map(m=>`
    <div class="member-card">
      <div class="member-header">
        <span class="member-name">${m.name}</span>
        <span class="badge ${m.area==='tokyo'?'badge-tokyo':'badge-osaka'}">${m.area==='tokyo'?'東京':'大阪'}</span>
        ${m.type==='fullcomm'?'<span class="badge badge-fullcomm">フルコミ</span>':''}
        <button class="btn btn-danger btn-sm" onclick="deleteMember(${m.id})">削除</button>
      </div>
      <div class="member-body">
        <div class="member-row">
          <label>名前</label>
          <input class="input wide" value="${m.name}" onchange="updateMember(${m.id},'name',this.value);renderMembers()">
        </div>
        <div class="member-row">
          <label>エリア</label>
          <select class="select" onchange="updateMember(${m.id},'area',this.value)">
            <option value="tokyo" ${m.area==='tokyo'?'selected':''}>東京（自社ポス）</option>
            <option value="osaka" ${m.area==='osaka'?'selected':''}>大阪（外注ポス）</option>
          </select>
        </div>
        <div class="member-row">
          <label>雇用形態</label>
          <select class="select" onchange="updateMember(${m.id},'type',this.value)">
            <option value="fixed" ${m.type==='fixed'?'selected':''}>固定給</option>
            <option value="fullcomm" ${m.type==='fullcomm'?'selected':''}>フルコミ</option>
          </select>
        </div>
        <div class="member-row">
          <label>${m.type==='fullcomm'?'単価':'固定給'}</label>
          <input type="number" class="input wide" value="${m.salary}" onchange="updateMember(${m.id},'salary',this.value)">
          <span class="unit">${m.type==='fullcomm'?'円/件':'円/月'}</span>
        </div>
        <div class="member-row">
          <label>週間枚数</label>
          <input type="number" class="input wide" value="${m.weeklySheetsInput}" onchange="updateMember(${m.id},'weeklySheetsInput',this.value)">
          <span class="unit">枚/週</span>
        </div>
      </div>
    </div>
  `).join('');
}

function getSettings(){
  return {
    hankyouTokyo:(parseFloat(document.getElementById('k-hankyou-tokyo').value)||0)/100,
    hankyouOsaka:(parseFloat(document.getElementById('k-hankyou-osaka').value)||0)/100,
    taimen:(parseFloat(document.getElementById('k-taimen').value)||0)/100,
    shutoku:(parseFloat(document.getElementById('k-shutoku').value)||0)/100,
    koku:(parseFloat(document.getElementById('k-koku').value)||0)/100,
    kaisen:(parseFloat(document.getElementById('k-kaisen').value)||0)/100,
    tanka:parseFloat(document.getElementById('k-tanka').value)||0,
    chirashi:parseFloat(document.getElementById('k-chirashi').value)||0,
    opp:parseFloat(document.getElementById('k-opp').value)||0,
    posting:parseFloat(document.getElementById('k-posting').value)||0,
    kotsu:parseFloat(document.getElementById('k-kotsu').value)||0,
    office:parseFloat(document.getElementById('k-office').value)||0,
    other:parseFloat(document.getElementById('k-other').value)||0,
    target:parseFloat(document.getElementById('k-target').value)||0,
  };
}

function calcMember(m,s){
  const monthlySheets=m.weeklySheetsInput*4;
  const hankyou=m.area==='tokyo'?s.hankyouTokyo:s.hankyouOsaka;
  const appo=monthlySheets*hankyou;
  const taimen=appo*s.taimen;
  const shutoku=taimen*s.shutoku;
  const koku=shutoku*s.koku;
  const kaisen=koku*s.kaisen;
  const rev=kaisen*s.tanka;
  const hpk=kaisen>0?monthlySheets/kaisen:217;
  const vcChirashi=kaisen*hpk*(s.chirashi+s.opp);
  const vcPosting=m.area==='osaka'?monthlySheets*s.posting:0;
  const vcFullcomm=m.type==='fullcomm'?kaisen*m.salary:0;
  const margin=rev-vcChirashi-vcPosting-vcFullcomm;
  const fixedSal=m.type==='fixed'?m.salary*1.2:0;
  return {monthlySheets,appo,taimen,shutoku,koku,kaisen,rev,vcChirashi,vcPosting,vcFullcomm,margin,fixedSal};
}

function calcAll(){save();}

function renderResult(){
  const s=getSettings();
  const content=document.getElementById('result-content');
  if(!members.length){content.innerHTML='<div class="empty">メンバーを追加してください</div>';return;}

  let totalRev=0,totalMargin=0,totalFixedSal=0,totalSheets=0,totalKaisen=0;
  let tokyoRev=0,tokyoMargin=0,tokyoFixedSal=0,tokyoKaisen=0;
  let osakaRev=0,osakaMargin=0,osakaFixedSal=0,osakaKaisen=0;

  members.forEach(m=>{
    const c=calcMember(m,s);
    totalRev+=c.rev;totalMargin+=c.margin;totalFixedSal+=c.fixedSal;
    totalSheets+=c.monthlySheets;totalKaisen+=c.kaisen;
    if(m.area==='tokyo'){tokyoRev+=c.rev;tokyoMargin+=c.margin;tokyoFixedSal+=c.fixedSal;tokyoKaisen+=c.kaisen;}
    else{osakaRev+=c.rev;osakaMargin+=c.margin;osakaFixedSal+=c.fixedSal;osakaKaisen+=c.kaisen;}
  });

  const commonFix=s.kotsu*members.length+s.office+s.other;
  const totalOp=totalMargin-totalFixedSal-commonFix;
  const target=s.target;
  const pct=target>0?Math.min(Math.round(totalRev/target*100),999):0;
  const ldr=totalMargin>0?totalFixedSal/totalMargin*100:0;

  const fmt=n=>Math.round(n).toLocaleString()+'円';
  const fmtM=n=>'約'+Math.round(n/10000).toLocaleString()+'万円';
  const fmtP=n=>Math.round(n*10)/10+'%';
  const colorClass=n=>n>=0?'positive':'negative';

  content.innerHTML=`
    <div class="result-big">
      <div class="result-big-label">月間売上（予想）</div>
      <div class="result-big-val">${fmtM(totalRev)}</div>
    </div>
    <div class="target-wrap">
      <div class="target-header">
        <div class="target-title">目標達成率</div>
        <div class="target-pct ${pct>=100?'success-c':pct>=70?'warning-c':'danger-c'}">${pct}%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${pct>=100?'var(--success)':pct>=70?'var(--warning)':'var(--accent)'}"></div></div>
      <div class="target-sub ${totalRev>=target?'success-c':''}">${totalRev>=target?'目標達成！':'あと約'+Math.round((target-totalRev)/10000).toLocaleString()+'万円'}</div>
    </div>
    <div class="grid2">
      <div class="small-card"><div class="small-label">東京 開通</div><div class="small-val">${Math.round(tokyoKaisen)}件</div></div>
      <div class="small-card"><div class="small-label">大阪 開通</div><div class="small-val">${Math.round(osakaKaisen)}件</div></div>
    </div>
    <div class="section-title">メンバー別予測</div>
    ${members.map(m=>{
      const c=calcMember(m,s);
      return `<div class="pl-card">
        <div class="pl-title">
          ${m.name}
          <span class="badge ${m.area==='tokyo'?'badge-tokyo':'badge-osaka'}" style="font-size:10px">${m.area==='tokyo'?'東京':'大阪'}</span>
          ${m.type==='fullcomm'?'<span class="badge badge-fullcomm" style="font-size:10px">フルコミ</span>':''}
        </div>
        <div class="pl-row sub"><span>配布枚数</span><span>${Math.round(c.monthlySheets).toLocaleString()}枚/月</span></div>
        <div class="pl-row sub"><span>アポ数</span><span>${Math.round(c.appo)}件</span></div>
        <div class="pl-row sub"><span>獲得数</span><span>${Math.round(c.shutoku)}件</span></div>
        <div class="pl-row"><span>開通数</span><span style="font-weight:700;color:var(--accent)">${Math.round(c.kaisen)}件</span></div>
        <div class="pl-row"><span>売上</span><span class="accent-text">${fmtM(c.rev)}</span></div>
        <div class="pl-row"><span>限界利益</span><span class="${colorClass(c.margin)}">${fmtM(c.margin)}</span></div>
      </div>`;
    }).join('')}
    <div class="section-title">全体損益</div>
    <div class="pl-card">
      <div class="pl-title">全体PL</div>
      <div class="pl-row"><span>売上高</span><span class="accent-text">${fmtM(totalRev)}</span></div>
      <div class="pl-row"><span>限界利益</span><span class="${colorClass(totalMargin)}">${fmtM(totalMargin)}</span></div>
      <div class="pl-row sub"><span>　限界利益率</span><span>${totalRev>0?fmtP(totalMargin/totalRev*100):'—'}</span></div>
      <div class="pl-row sub"><span>　人件費（固定給×1.2）</span><span>-${fmt(totalFixedSal)}</span></div>
      <div class="pl-row sub"><span>　その他固定費</span><span>-${fmt(commonFix)}</span></div>
      <div class="pl-row total"><span>営業利益</span><span class="${colorClass(totalOp)}">${fmtM(totalOp)}</span></div>
      <div class="pl-row sub"><span>　営業利益率</span><span>${totalRev>0?fmtP(totalOp/totalRev*100):'—'}</span></div>
      <div class="pl-row sub"><span>　労働分配率</span><span class="${ldr<=55?'positive':ldr<=70?'warning-c':'danger-c'}">${fmtP(ldr)}</span></div>
    </div>
  `;
}

function addLog(){
  const week=prompt('週を入力してください（例：5月1週）');
  if(!week)return;
  const log={id:Date.now(),week,entries:members.map(m=>({memberId:m.id,name:m.name,sheets:0,appo:0,taimen:0,shutoku:0,kaisen:0}))};
  logs.unshift(log);
  save();
  renderLogs();
}

function updateLog(logId,memberId,field,val){
  const log=logs.find(l=>l.id===logId);
  if(!log)return;
  const entry=log.entries.find(e=>e.memberId===memberId);
  if(!entry)return;
  entry[field]=parseFloat(val)||0;
  save();
  updateActualKPI();
}

function deleteLog(id){
  if(!confirm('削除しますか？'))return;
  logs=logs.filter(l=>l.id!==id);
  save();
  renderLogs();
  updateActualKPI();
}

function updateActualKPI(){
  if(!logs.length){document.getElementById('actual-kpi').style.display='none';return;}
  let totalSheets=0,totalAppo=0,totalTaimen=0,totalShutoku=0,totalKaisen=0;
  logs.forEach(log=>{
    log.entries.forEach(e=>{
      totalSheets+=e.sheets;totalAppo+=e.appo;
      totalTaimen+=e.taimen;totalShutoku+=e.shutoku;totalKaisen+=e.kaisen;
    });
  });
  document.getElementById('actual-kpi').style.display='block';
  document.getElementById('act-hankyou').textContent=totalSheets>0?(totalAppo/totalSheets*100).toFixed(2)+'%':'—';
  document.getElementById('act-taimen').textContent=totalAppo>0?(totalTaimen/totalAppo*100).toFixed(1)+'%':'—';
  document.getElementById('act-shutoku').textContent=totalTaimen>0?(totalShutoku/totalTaimen*100).toFixed(1)+'%':'—';
  document.getElementById('act-kaisen-rate').textContent=totalShutoku>0?(totalKaisen/totalShutoku*100).toFixed(1)+'%':'—';
}

function renderLogs(){
  const list=document.getElementById('log-list');
  if(!logs.length){list.innerHTML='<div class="empty">ログがありません<br>「今週を記録」から追加してください</div>';updateActualKPI();return;}
  list.innerHTML=logs.map(log=>{
    const totalKaisen=log.entries.reduce((a,e)=>a+e.kaisen,0);
    return `<div class="log-card">
      <div class="log-header">
        <div class="log-week">📅 ${log.week}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="log-total">開通 ${Math.round(totalKaisen)}件</div>
          <button class="btn btn-danger btn-sm" onclick="deleteLog(${log.id})">削除</button>
        </div>
      </div>
      <div class="log-body">
        ${log.entries.map(e=>`
          <div class="log-member-row">
            <div class="log-member-name">${e.name}</div>
            <div class="log-inputs">
              <div class="log-input-wrap">
                <div class="log-input-label">枚数</div>
                <input type="number" class="log-input" value="${e.sheets||''}" placeholder="0" onchange="updateLog(${log.id},${e.memberId},'sheets',this.value)">
              </div>
              <div class="log-input-wrap">
                <div class="log-input-label">アポ</div>
                <input type="number" class="log-input" value="${e.appo||''}" placeholder="0" onchange="updateLog(${log.id},${e.memberId},'appo',this.value)">
              </div>
              <div class="log-input-wrap">
                <div class="log-input-label">対面</div>
                <input type="number" class="log-input" value="${e.taimen||''}" placeholder="0" onchange="updateLog(${log.id},${e.memberId},'taimen',this.value)">
              </div>
              <div class="log-input-wrap">
                <div class="log-input-label">獲得</div>
                <input type="number" class="log-input" value="${e.shutoku||''}" placeholder="0" onchange="updateLog(${log.id},${e.memberId},'shutoku',this.value)">
              </div>
              <div class="log-input-wrap">
                <div class="log-input-label">開通</div>
                <input type="number" class="log-input" value="${e.kaisen||''}" placeholder="0" onchange="updateLog(${log.id},${e.memberId},'kaisen',this.value)">
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
  updateActualKPI();
}

// 初期化
load();
renderMembers();
renderLogs();
</script>
</body>
</html>
